server:
  port: 8602
spring:
  application:
    name: customer_service
  datasource:
    url: jdbc:mysql://localhost:3306/customer_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true